name: eco_recycle
description: EcoRecycle - Reduce plastic bottle waste. Scan bottles, confirm recycling, earn points.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: 4.4.0
  firebase_auth: 6.1.4
  cloud_firestore: 6.1.2
  firebase_storage: ^13.0.6
  
  # Scanning
  mobile_scanner: ^4.0.1
  
  # Image
  image_picker: ^1.0.7
  
  # Camera
  camera: ^0.10.5+9
  
  # State & routing
  provider: ^6.1.1
  go_router: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/images/logo.jpeg
    background_color: "#ffffff"
    theme_color: "#1565C0"
  windows:
    generate: true
    image_path: assets/images/logo.jpeg
    icon_size: 48
  macos:
    generate: true
    image_path: assets/images/logo.jpeg
  image_path: assets/images/logo.jpeg
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/logo.jpeg
